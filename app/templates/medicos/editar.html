{% extends 'base.html' %}

{% block content %}

<h1>Nuevo Médico</h1>

<form method="POST">

    <div class="mb-3">

        <label>Nombre</label>

        <input
            type="text"
            name="nombre"
            class="form-control"
        >

    </div>

    <div class="mb-3">

        <label>Especialidad</label>

        <input
            type="text"
            name="especialidad"
            class="form-control"
        >

    </div>

    <button class="btn btn-success">
        Guardar
    </button>

</form>

{% endblock %}
