{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">Lista de Médicos</h1>

<a href="/medicos/nuevo" class="btn btn-success mb-3">
    Nuevo
</a>

<table class="table table-striped table-bordered">

    <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Especialidad</th>
            <th>Acciones</th>
        </tr>

    </thead>

    <tbody>

        {% for medico in medicos %}

        <tr>

            <td>{{ medico.id }}</td>

            <td>{{ medico.nombre }}</td>

            <td>{{ medico.especialidad }}</td>

            <td>

                <a
                    href="/medicos/editar/{{ medico.id }}"
                    class="btn btn-warning btn-sm"
                >
                    Editar
                </a>

                <a
                    href="/medicos/eliminar/{{ medico.id }}"
                    class="btn btn-danger btn-sm"
                >
                    Eliminar
                </a>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
